# H2 file mode — persisted on Render's mounted disk (/app/data)
spring.datasource.url=jdbc:h2:file:/app/data/subscrub;AUTO_SERVER=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.h2.console.enabled=false

# Spring AI — Gemini (chat / SQL generation fallback + explanations only)
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.structured-output=true

# Local ONNX bi-encoder
spring.ai.transformers.embedding.enabled=true
spring.ai.transformers.embedding.options.model-name=sentence-transformers/all-MiniLM-L6-v2

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
