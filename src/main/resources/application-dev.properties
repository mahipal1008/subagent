# H2 file mode — persists data across restarts
spring.datasource.url=jdbc:h2:file:./data/subscrub;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create
# Defer SQL init until after JPA has created the schema
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
spring.sql.init.mode=always

# Spring AI — Gemini (chat / SQL generation fallback + explanations only)
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.structured-output=true

# Local ONNX bi-encoder — 22MB all-MiniLM-L6-v2, CPU-only, no API key needed
# Downloaded once to ~/.cache on first run
spring.ai.transformers.embedding.enabled=true
spring.ai.transformers.embedding.options.model-name=sentence-transformers/all-MiniLM-L6-v2

# File upload max size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
