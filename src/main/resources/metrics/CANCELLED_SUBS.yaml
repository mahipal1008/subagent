intent: CANCELLED_SUBS
version: "1.0"
description: "Subscriptions that have been cancelled or paused"
sql: |
  SELECT
    s.name,
    s.current_amount,
    s.category,
    s.status,
    s.first_seen,
    s.last_seen
  FROM subscriptions s
  WHERE s.user_id = :userId
    AND s.status IN ('CANCELLED', 'PAUSED')
  ORDER BY s.last_seen DESC
params:
  - name: userId
    type: string
    required: true
data_window: "All cancelled/paused subscriptions"
