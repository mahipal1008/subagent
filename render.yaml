services:
  - type: web
    name: subscrub
    runtime: docker
    plan: standard
    healthCheckPath: /
    disk:
      name: subscrub-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard
